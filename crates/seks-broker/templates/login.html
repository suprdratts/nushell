{% extends "base.html" %}

{% block title %}Login - SEKS Broker{% endblock %}

{% block body %}
<div class="auth-container">
    <div class="auth-card">
        <h1><span style="color: var(--accent);">SEKS</span> Broker</h1>
        
        {% if let Some(err) = error %}
        <div class="alert alert-error">
            {{ err }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Sign In
            </button>
        </form>
        
        <p class="text-muted text-center mt-2" style="font-size: 0.875rem;">
            New here? Just enter your email and password to create an account.
        </p>
    </div>
</div>
{% endblock %}
